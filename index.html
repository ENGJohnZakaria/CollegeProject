<!DOCTYPE html>
<html>
<head>
    <title>Mt3mna</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <span class="logo">Welcome to MT3MNA</span>
        <a href="about.html"><img src="About-us.png" alt="About Us" width="50"></a>
        <a href="Menu.html"><img src="Menu.png" alt="Menu" width="50"></a>
        <a href="index.html"><img src="Login.png" alt="Login" width="50"></a>
    </div>

<div class="login-box">
    <h2>Please Sign in</h2>
    <p class="subtitle">Please enter your credentials</p>
    <form action="about.html">
        <div>
           <label for="username">Username:</label>
           <input type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required>
        </div>
        <div>
            <label for="pass">Password:</label>
            <input type="password"
                    id="pass"
                    name="password"
                    minlength="8"
                    placeholder="Enter your password"
                    required>
        </div>

            <input type="submit" value="Sign in">
    </form> 
</div>

<div class="footer">
    <p>MT3MNA &copy; 2025 - Cairo, Egypt</p>
</div>

</body>
</html>
